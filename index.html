<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator {
            background: #2e2e2e;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            padding: 20px;
        }
        #display {
            width: 100%;
            height: 60px;
            background: #444;
            border-radius: 5px;
            text-align: right;
            font-size: 2em;
            padding: 10px;
            margin-bottom: 20px;
        }
        button {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 10px;
            margin: 5px;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .num {
            background: lightgray;
        }
        .basic {
            background: blue;
            color: white;
        }
        .scientific {
            background: purple;
            color: white;
        }
        .clear {
            background: red;
            color: white;
        }
        .equals {
            background: green;
            color: white;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div id="display"></div>
        <div>
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="clear" onclick="backspace()">&#9003;</button>
            <button class="scientific" onclick="appendCharacter('sin(')">sin</button>
            <button class="scientific" onclick="appendCharacter('cos(')">cos</button>
            <button class="scientific" onclick="appendCharacter('tan(')">tan</button>
        </div>
        <div>
            <button class="num" onclick="appendCharacter('7')">7</button>
            <button class="num" onclick="appendCharacter('8')">8</button>
            <button class="num" onclick="appendCharacter('9')">9</button>
            <button class="basic" onclick="appendCharacter('/')">/</button>
        </div>
        <div>
            <button class="num" onclick="appendCharacter('4')">4</button>
            <button class="num" onclick="appendCharacter('5')">5</button>
            <button class="num" onclick="appendCharacter('6')">6</button>
            <button class="basic" onclick="appendCharacter('*')">*</button>
        </div>
        <div>
            <button class="num" onclick="appendCharacter('1')">1</button>
            <button class="num" onclick="appendCharacter('2')">2</button>
            <button class="num" onclick="appendCharacter('3')">3</button>
            <button class="basic" onclick="appendCharacter('-')">-</button>
        </div>
        <div>
            <button class="num" onclick="appendCharacter('0')">0</button>
            <button class="num" onclick="appendCharacter('pi')">π</button>
            <button class="num" onclick="appendCharacter('e')">e</button>
            <button class="basic" onclick="appendCharacter('+')">+</button>
        </div>
        <div>
            <button class="scientific" onclick="appendCharacter('ln(')">ln</button>
            <button class="scientific" onclick="appendCharacter('log(')">log</button>
            <button class="scientific" onclick="appendCharacter('pow(')">xʸ</button>
            <button class="scientific" onclick="appendCharacter('sqrt(')">√</button>
        </div>
        <div>
            <button class="equals" onclick="calculateResult()">=</button>
        </div>
    </div>
    <script>
        let expression = '';
        const display = document.getElementById('display');

        function appendCharacter(character) {
            expression += character;
            display.innerText = expression;
        }

        function clearDisplay() {
            expression = '';
            display.innerText = '0';
        }

        function backspace() {
            expression = expression.slice(0, -1);
            display.innerText = expression || '0';
        }

        function calculateResult() {
            try {
                const result = eval(expression.replace(/pi/g, Math.PI).replace(/e/g, Math.E));
                if (result === Infinity) throw new Error('Division by zero');
                expression = result.toString();
                display.innerText = expression;
            } catch (e) {
                display.innerText = 'Error';
                setTimeout(clearDisplay, 2000);
            }
        }

        document.addEventListener('keydown', function (event) {
            if (event.key >= 0 && event.key <= 9) {
                appendCharacter(event.key);
            } else if (event.key === 'Enter') {
                calculateResult();
            } else if (event.key === 'Backspace') {
                backspace();
            } else if (['+', '-', '*', '/'].includes(event.key)) {
                appendCharacter(event.key);
            }
        });
    </script>
</body>
</html>
