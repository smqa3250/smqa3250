<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
            color: #333;
        }
        #calculator {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 300px;
            margin: auto;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 24px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            margin: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div id="calculator">
        <input type="text" id="display" disabled />
        <div>
            <button onclick="clearDisplay()">C</button>
            <button onclick="calculate('sin')">sin</button>
            <button onclick="calculate('cos')">cos</button>
            <button onclick="calculate('tan')">tan</button>
            <button onclick="calculate('log')">log</button>
            <button onclick="calculate('sqrt')">√</button>
        </div>
        <div>
            <button onclick="calculate('pi')">π</button>
            <button onclick="calculate('e')">e</button>
            <button onclick="calculate('exp')">e^x</button>
            <button onclick="calculate('power')">x^y</button>
            <button onclick="calculate('calculate')">=</button>
        </div>
    </div>
    <script>
        function clearDisplay() {
            document.getElementById('display').value = '';
        }

        function calculate(operation) {
            const display = document.getElementById('display');
            const degrees = parseFloat(display.value);
            let result;

            // Convert degrees to radians for the trigonometric functions
            const radians = degrees * (Math.PI / 180);

            switch (operation) {
                case 'sin':
                    result = Math.sin(radians);
                    break;
                case 'cos':
                    result = Math.cos(radians);
                    break;
                case 'tan':
                    result = Math.tan(radians);
                    break;
                case 'log':
                    result = Math.log10(degrees);
                    break;
                case 'sqrt':
                    result = Math.sqrt(degrees);
                    break;
                case 'power':
                    // Handle power operation separately
                    const base = parseFloat(display.value.split('^')[0]);
                    const exponent = parseFloat(display.value.split('^')[1]);
                    result = Math.pow(base, exponent);
                    break;
                case 'pi':
                    result = Math.PI;
                    break;
                case 'e':
                    result = Math.E;
                    break;
                case 'exp':
                    result = Math.exp(degrees);
                    break;
                default:
                    result = 'Error';
            }

            display.value = result;
        }
    </script>
</body>
</html>
